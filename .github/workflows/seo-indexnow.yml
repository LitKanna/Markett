name: SEO IndexNow ping

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "sitemap.xml"
      - "robots.txt"
      - "8f3c2a1b9d4e7f6a8b2c1d0e9f8a7b6c.txt"
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Ping IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          KEY="${INDEXNOW_KEY:-8f3c2a1b9d4e7f6a8b2c1d0e9f8a7b6c}"
          curl -sf -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"getyolko.com\",\"key\":\"${KEY}\",\"keyLocation\":\"https://getyolko.com/${KEY}.txt\",\"urlList\":[\"https://getyolko.com/\",\"https://getyolko.com/sitemap.xml\"]}"
