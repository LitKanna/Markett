name: SEO ping (IndexNow + Google Search Console)

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "sitemap.xml"
      - "robots.txt"
      - "8f3c2a1b9d4e7f6a8b2c1d0e9f8a7b6c.txt"
      - "infra/seo-*.mjs"
      - ".github/workflows/seo-indexnow.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ping IndexNow (Bing / Yandex)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: npm run seo:indexnow

      - name: Submit sitemap to Google Search Console
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: https://getyolko.com/
          GOOGLE_SITEMAP_URL: https://getyolko.com/sitemap.xml
        run: npm run seo:google
